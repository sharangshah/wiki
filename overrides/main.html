{% extends "base.html" %}

{% block extrahead %}
  <!-- Privacy: prevent search engine indexing -->
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="googlebot" content="noindex, nofollow">
  <!-- Favicon -->
  <link rel="icon" href="{{ base_url }}/assets/favicon.png" type="image/png">
{% endblock %}

{% block footer %}
  {{ super() }}
  <style>
    .md-footer-meta__inner {
      display: flex;
      justify-content: center;
      padding: 0.6rem;
    }
    .md-footer-copyright {
      font-family: 'Inter', Arial, sans-serif;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.03em;
    }
  </style>
  <div class="md-footer-copyright" style="text-align:center; padding: 0.5rem 0 1rem;">
    A personal knowledge base by Sharang — not indexed, not public.
  </div>
{% endblock %}
